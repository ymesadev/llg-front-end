<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Injury Intake Qualifier — Louis Law Group</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;font-family:'Georgia',serif}
.qf{background:#0f1117;border-radius:16px;min-height:520px;display:flex;flex-direction:column;overflow:hidden;width:100%;max-width:680px}
.qf-bar{height:3px;background:#1e2130}
.qf-prog{height:100%;background:#c9764c;transition:width .5s ease}
.qf-inner{flex:1;display:flex;flex-direction:column;justify-content:center;padding:44px 52px 38px}
#sc{animation:fu .38s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:11px;letter-spacing:.12em;color:#5a6080;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:12px}
.tbadge{display:inline-block;background:#1a1c28;border:1px solid #2a2d40;color:#7a7a9a;font-size:11px;font-family:'Courier New',monospace;padding:3px 10px;border-radius:5px;margin-bottom:14px;letter-spacing:.08em;text-transform:uppercase}
.q{font-size:22px;color:#e8e4d8;line-height:1.45;font-weight:400;margin-bottom:7px;max-width:520px}
.hint{font-size:13px;color:#484868;margin-bottom:24px;font-family:'Courier New',monospace}
.opts{display:flex;flex-direction:column;gap:8px;max-width:500px}
.opt{background:#181c2a;border:1px solid #252a3d;border-radius:10px;padding:12px 18px;color:#b0acba;font-size:15px;cursor:pointer;transition:all .18s;font-family:'Georgia',serif;text-align:left;line-height:1.35}
.opt:hover{border-color:#c9764c;color:#e8e4d8;background:#1d1f2e}
.opt.sel{border-color:#c9764c;background:#1c1a2a;color:#e8e4d8}
.ok{font-size:11px;font-family:'Courier New',monospace;color:#c9764c;margin-right:10px;opacity:.8}
.date-inp{background:#181c2a;border:1px solid #252a3d;border-radius:10px;padding:13px 18px;color:#e8e4d8;font-size:15px;font-family:'Georgia',serif;width:100%;max-width:300px;outline:none;display:block}
.date-inp:focus{border-color:#c9764c}
.dnote{font-size:12px;color:#484868;font-family:'Courier New',monospace;margin-top:8px}
.btn-p{margin-top:20px;background:#c9764c;border:none;border-radius:10px;padding:12px 32px;color:#fff;font-size:15px;font-family:'Georgia',serif;cursor:pointer;transition:opacity .18s}
.btn-p:hover{opacity:.85}
.btn-p:disabled{opacity:.3;cursor:default}
.inp-row{display:flex;flex-direction:column;gap:12px;max-width:400px}
.iw{display:flex;flex-direction:column;gap:5px}
.ilbl{font-size:11px;letter-spacing:.1em;color:#5a6080;text-transform:uppercase;font-family:'Courier New',monospace}
.ifield{background:#181c2a;border:1px solid #252a3d;border-radius:10px;padding:12px 16px;color:#e8e4d8;font-size:15px;font-family:'Georgia',serif;outline:none;width:100%}
.ifield:focus{border-color:#c9764c}
.nav{display:flex;align-items:center;gap:18px;margin-top:16px}
.bk{background:none;border:none;color:#484868;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;padding:0;letter-spacing:.06em;text-transform:uppercase}
.bk:hover{color:#a0a0c0}
.rs{background:none;border:none;color:#3a3858;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;padding:0;letter-spacing:.06em;text-transform:uppercase}
.rs:hover{color:#7070a0}
.sp{color:#2a2840;font-size:12px}
.eh{font-size:20px;color:#e8e4d8;font-weight:400;margin-bottom:10px;max-width:480px;line-height:1.45}
.eb{font-size:14px;color:#6a6888;font-family:'Courier New',monospace;max-width:480px;line-height:1.7;margin-bottom:22px}
.cta{background:#c9764c;color:#fff;padding:12px 28px;border-radius:10px;font-size:15px;font-family:'Georgia',serif;cursor:pointer;text-decoration:none;border:none;display:inline-block}
.cta:hover{opacity:.87}
.end-ico{font-size:26px;margin-bottom:14px}
@media(max-width:600px){.qf-inner{padding:32px 24px 28px}.q{font-size:18px}}
</style>
</head>

const B={auto:{name:'Motor Vehicle Accident',steps:[{id:'date',type:'date',q:'When did the accident occur?',hint:"Florida's statute of limitations is 2 years from the date of injury"},{id:'role',type:'opts',q:'What was your role in the accident?',hint:'Your position determines which insurance coverages apply to your claim',opts:[{k:'A',t:'I was the driver of a vehicle',v:'driver'},{k:'B',t:'I was a passenger in a vehicle',v:'passenger'},{k:'C',t:'I was a pedestrian struck by a vehicle',v:'pedestrian'},{k:'D',t:'I was a cyclist or motorcyclist',v:'cyclist'}]},{id:'fault_doc',type:'opts',q:'Was fault established or documented at the scene?',hint:'Police reports, citations, and witness statements all strengthen your claim',opts:[{k:'A',t:'Yes — the other driver was cited or admitted fault',v:'yes'},{k:'B',t:'I was rear-ended or clearly not at fault',v:'clear'},{k:'C',t:'Hit and run — the other driver fled the scene',v:'hitrun'},{k:'D',t:'Fault was disputed or unclear at the time',v:'disputed'}]},{id:'severity',type:'opts',q:'How would you describe your injuries?',hint:'Injury severity affects case value and your medical treatment needs',opts:[{k:'A',t:'Soft tissue injuries — whiplash, sprains, or bruising',v:'soft'},{k:'B',t:'Fractures, surgery required, or hospitalization',v:'serious'},{k:'C',t:'Spinal injury, traumatic brain injury, or permanent disability',v:'severe'},{k:'D',t:'A family member was killed in the accident',v:'death'}]},{id:'treatment',type:'opts',q:'Have you received medical treatment for your injuries?',hint:'Prompt medical care is critical — gaps in treatment can affect your recovery',opts:[{k:'A',t:'Yes — ER, urgent care, doctor, or specialist',v:'yes'},{k:'B',t:'Not yet, but I am in pain and need care',v:'not_yet'},{k:'C',t:'No — I have not sought any medical attention',v:'no'}]},{id:'auto_ins',type:'opts',q:'Do you know if the at-fault driver had auto insurance?',hint:'Florida requires PIP coverage; uninsured motorist coverage may also apply',opt rty owner or manager?',hint:'An incident report creates an official record — even verbal reports matter',opts:[{k:'A',t:'Yes — an incident report was filed at the time',v:'yes'},{k:'B',t:'I reported it verbally but no written report was completed',v:'verbal'},{k:'C',t:'No — I did not report it at the time',v:'no'}]},{id:'injury',type:'opts',q:'Were you physically injured in the fall?',hint:'Physical injury is required to pursue a premises liability claim',opts:[{k:'A',t:'Yes — cuts, fractures, sprains, or other physical injuries',v:'yes'},{k:'B',t:'Yes — serious injuries requiring surgery or hospitalization',v:'serious'},{k:'C',t:'No physical injury — only embarrassment or property damage',v:'no',action:'dq:no_injury'}]},{id:'treatment',type:'opts',q:'Have you received medical treatment for your injuries?',hint:'Medical records directly link the fall to your injuries',opts:[{k:'A',t:'Yes — doctor, urgent care, ER, or specialist',v:'yes'},{k:'B',t:'Not yet, but I am in pain and need to be seen',v:'not_yet'},{k:'C',t:'No treatment sought',v:'no'}]},{id:'state',type:'opts',q:'Did the incident occur in Florida?',hint:'Louis Law Group handles personal injury cases in Florida only',opts:[{k:'A',t:'Yes — in Florida',v:'fl'},{k:'B',t:'No — in another state',v:'other',action:'dq:out_of_state'}]},{id:'rep',type:'opts',q:'Are you currently represented by another attorney for this matter?',hint:'We cannot accept cases currently handled by another firm',opts:[{k:'A',t:'Yes — I have an attorney handling this case',v:'yes',action:'dq:represented'},{k:'B',t:'No — I do not have an attorney',v:'no'},{k:'C',t:'I had one but have formally discharged them',v:'fired'}]}]},premises:{name:'Premises Liability',steps:[{id:'date',type:'date',q:'When did the incident occur?',hint:"Florida's statute of limitations is 2 years from the date of injury"},{id:'prop_type',type:'opts',q:'What type of property did the incident occur on?',hint:'Property type affects the legal duty of care owed to you',opts:[{k:'A',t:'Commercial business — store, office, or shopping center',v:'commercial'},{k:'B',t:'Residential property or apartment complex',v:'residential'},{k:'C',t:'Government or public property',v:'government'},{k:'D',t:'Entertainment venue, hotel, or resort',v:'entertainment'}]},{id:'incident_type',type:'opts',q:'What type of incident occurred on the property?',hint:'Select the closest match to your situation',opts:[{k:'A',t:'Attacked, robbed, or assaulted — negligent security',v:'security'},{k:'B',t:'Structural defect caused injury (staircase, balcony, railing)',v:'structural'},{k:'C',t:'Swimming pool accident or near-drowning',v:'pool'},{k:'D',t:'Dog bite or animal attack on the property',v:'dog'},{k:'E',t:'Other unsafe condition or hazard on the property',v:'other'}]},{id:'visitor_status',type:'opts',q:'What was your legal status on the property at the time?',hint:'Your status affects the duty of care the owner owed you under Florida law',opts:[{k:'A',t:'Invited guest, customer, or tenant',v:'invitee'},{k:'B',t:'Member of the general public (property open to all)',v:'public'},{k:'C',t:'Social guest of a resident',v:'licensee'},{k:'D',t:'I was trespassing on the property',v:'trespasser',action:'dq:trespasser'}]},{id:'injury',type:'opts',q:'Were you physically injured?',hint:'Physical injury is required to pursue a premises liability claim',opts:[{k:'A',t:'Yes — I sustained physical injuries',v:'yes'},{k:'B',t:'A family member was killed as a result of the incident',v:'death'},{k:'C',t:'No physical injury',v:'no',action:'dq:no_injury'}]},{id:'treatment',type:'opts',q:'Have you received medical treatment?',hint:'Medical documentation connects the incident directly to your injuries',opts:[{k:'A',t:'Yes — I have received treatment',v:'yes'},{k:'B',t:'Not yet, but I need to see a doctor',v:'not_yet'},{k:'C',t:'No treatment sought',v:'no'}]},{id:'state',type:'opts',q:'Did the incident occur in Florida?',hint:'Louis Law Group handles personal injury cases in Florida only',opts:[{k:'A',t:'Yes — in Florida',v:'fl'},{k:'B',t:'No — in another state',v:'other',action:'dq:out_of_state'}]},{id:'rep',type:'opts',q:'Are you currently represented by another attorney for this matter?',hint:'We cannot accept cases currently handled by another firm',opts:[{k:'A',t:'Yes — I have an attorney handling this case',v:'yes',action:'dq:represented'},{k:'B',t:'No — I do not have an attorney',v:'no'},{k:'C',t:'I had one but have formally discharged them',v:'fired'}]}]},wrongful:{name:'Wrongful Death',steps:[{id:'date',type:'date',q:'When did the death occur?',hint:"Florida's wrongful death statute of limitations is 2 years from the date of death"},{id:'cause',type:'opts',q:'What caused the death?',hint:'The cause helps us assess liability and applicable legal theories',opts:[{k:'A',t:'Motor vehicle accident',v:'auto'},{k:'B',t:'Medical malpractice or hospital negligence',v:'malpractice'},{k:'C',t:'Workplace accident or occupational hazard',v:'workplace'},{k:'D',t:'Premises incident — fall, negligent security, or pool',v:'premises'},{k:'E',t:'Criminal act or assault by another person',v:'criminal'},{k:'F',t:'Other negligent or reckless act',v:'other'}]},{id:'relationship',type:'opts',q:'What is your relationship to the deceased?',hint:'Florida law limits who may bring a wrongful death claim as a survivor',opts:[{k:'A',t:'Spouse',v:'spouse'},{k:'B',t:'Child (minor or adult)',v:'child'},{k:'C',t:'Parent of an unmarried adult or minor child',v:'parent'},{k:'D',t:'Other family member or financial dependent',v:'other'}]},{id:'estate',type:'opts',q:'Has an estate been opened or a personal representative appointed?',hint:"Florida wrongful death claims must be brought by the estate's personal representative",opts:[{k:'A',t:'Yes — an estate has been opened',v:'yes'},{k:'B',t:'No — but the family is willing to open one',v:'willing'},{k:'C',t:'No — we are unsure how to proceed with this',v:'unsure'}]},{id:'autopsy',type:'opts',q:'Was an autopsy or official cause of death established?',hint:'An official determination of cause of death strengthens the case considerably',opts:[{k:'A',t:'Yes — an autopsy was performed or cause of death is documented',v:'yes'},{k:'B',t:'Yes — death certificate lists the cause',v:'cert'},{k:'C',t:'No official determination has been made',v:'no'},{k:'D',t:'I am not sure',v:'unsure'}]},{id:'state',type:'opts',q:'Did the incident that caused the death occur in Florida?',hint:'Louis Law Group handles wrongful death cases in Florida only',opts:[{k:'A',t:'Yes — in Florida',v:'fl'},{k:'B',t:'No — in another state',v:'other',action:'dq:out_of_state'}]},{id:'rep',type:'opts',q:'Is the estate currently represented by another attorney for this matter?',hint:'We cannot accept matters currently handled by another firm',opts:[{k:'A',t:'Yes — there is already an attorney on this matter',v:'yes',action:'dq:represented'},{k:'B',t:'No — there is no current representation',v:'no'},{k:'C',t:'There was an attorney but they have been discharged',v:'fired'}]}]},other:{name:'Other Personal Injury',steps:[{id:'other_type',type:'opts',q:'What best describes your situation?',hint:'Select the option that most closely matches the type of harm you suffered',opts:[{k:'A',t:'Dog bite or animal attack',v:'dog'},{k:'B',t:'Defective or dangerous product caused my injury',v:'product'},{k:'C',t:'I was assaulted or battered by another person',v:'assault'},{k:'D',t:'Workplace injury not covered by workers compensation',v:'workplace'},{k:'E',t:'Medical malpractice or healthcare provider negligence',v:'malpractice'}]},{id:'date',type:'date',q:'When did the incident occur?',hint:"Florida's statute of limitations is 2 years from the date of injury"},{id:'injury',type:'opts',q:'Were you physically injured?',hint:'Physical harm is required to bring a personal injury claim',opts:[{k:'A',t:'Yes — I sustained physical injuries',v:'yes'},{k:'B',t:'A family member was killed as a result',v:'death'},{k:'C',t:'No physical injury',v:'no',action:'dq:no_injury'}]},{id:'treatment',type:'opts',q:'Have you received medical treatment for your injuries?',hint:'Medical documentation is critical to establishing the extent of your damages',opts:[{k:'A',t:'Yes — I have received treatment',v:'yes'},{k:'B',t:'Not yet, but I need to see a doctor',v:'not_yet'},{k:'C',t:'No treatment sought',v:'no'}]},{id:'fault',type:'opts',q:'Who was responsible for the incident?',hint:'Florida follows comparative negligence — partial fault is still actionable',opts:[{k:'A',t:'Another person, business, or manufacturer',v:'other'},{k:'B',t:'Primarily someone else — I may have contributed slightly',v:'partial'},{k:'C',t:'Circumstances are unclear — I am not sure who is at fault',v:'unsure'},{k:'D',t:'I was entirely at fault',v:'self',action:'dq:self_fault'}]},{id:'defendant_ins',type:'opts',q:'Is the responsible party insured or a business with coverage?',hint:'Available insurance or assets affect the viability of recovery',opts:[{k:'A',t:'Yes — they have insurance or are a business',v:'yes'},{k:'B',t:'Unknown — I am not sure of their coverage',v:'unknown'},{k:'C',t:'No — they appear to be uninsured or have no assets',v:'no'}]},{id:'state',type:'opts',q:'Did the incident occur in Florida?',hint:'Louis Law Group handles personal injury cases in Florida only',opts:[{k:'A',t:'Yes — in Florida',v:'fl'},{k:'B',t:'No — in another state',v:'other',action:'dq:out_of_state'}]},{id:'rep',type:'opts',q:'Are you currently represented by another attorney for this matter?',hint:'We cannot accept cases currently handled by another firm',opts:[{k:'A',t:'Yes — I have an attorney handling this case',v:'yes',action:'dq:represented'},{k:'B',t:'No — I do not have an attorney',v:'no'},{k:'C',t:'I had one but have formally discharged them',v:'fired'}]}]}};
const DQ={no_injury:{h:'Physical injury is required for a personal injury claim.',b:'Personal injury law requires documented bodily harm. If you experienced only property damage or emotional distress without physical injury, this type of claim may not apply. For property damage, our first-party property practice may be able to help.'},self_fault:{h:'We are unable to assist if you were entirely at fault.',b:"Florida's comparative negligence law allows partial fault cases, but if you were fully responsible for the incident, there is no viable third-party claim to pursue."},out_of_state:{h:'Louis Law Group handles Florida personal injury cases only.',b:'We are licensed to handle personal injury matters in Florida only. We recommend contacting a licensed personal injury attorney in the state where your incident occurred.'},represented:{h:'You are currently represented by another attorney.',b:'We are unable to take on a case already being handled by another firm. If you wish to change attorneys, you must formally discharge your current representation before we can evaluate your matter.'},sol_expired:{h:'The statute of limitations may have expired.',b:'Florida requires personal injury claims to be filed within 2 years of the date of injury. Based on the date you provided, the filing window may have closed. We strongly recommend consulting with an attorney immediately to evaluate any remaining options.'},trespasser:{h:'Trespassers have very limited rights to recover in Florida.',b:"Property owners generally owe a limited duty of care to trespassers. Unless intentional harm was inflicted or the owner knew of the trespasser's presence and failed to warn them, these claims are very difficult to pursue."}};
let branch=null,si=-1,dqReason=null;const ans={};let qlFlags=[];
function getTotal(){return branch?1+B[branch].steps.length+1:9}
function getPct(){const t=getTotal();if(si===-1)return 0;if(si==='contact')return Math.round(((t-1)/t)*100);if(si==='dq'||si==='ql')return 100;return Math.round(((si+1)/t)*100)}
function render(){const el=document.getElementById('sc');document.getElementById('prog').style.width=getPct()+'%';el.style.animation='none';el.innerHTML=getHTML();void el.offsetWidth;el.style.animation='fu .38s ease forwards'}
function nav(bf){return '<div class="nav"><button class="bk" onclick="'+bf+'">back</button><span class="sp">|</span><button class="rs" onclick="restart()">start over</button></div>'}
function getHTML(){if(si===-1)return typeHTML();if(si==='dq')return dqHTML();if(si==='ql')return qlHTML();if(si==='contact')return contactHTML();const step=B[branch].steps[si];const qn=si+2,tot=getTotal()-1;return step.type==='date'?dateHTML(step,qn,tot):optsHTML(step,qn,tot)}
function typeHTML(){return '<div class="lbl">Question 1</div><div class="q">What type of incident were you involved in?</div><div class="hint">Your follow-up questions will be tailored specifically to your situation</div><div class="opts"><button class="opt" onclick="pickType(this,\'auto\')"><span class="ok">A</span>Motor vehicle accident (car, truck, motorcycle, rideshare)</button><button class="opt" onclick="pickType(this,\'slip\')"><span class="ok">B</span>Slip, trip, or fall on someone\'s property</button><button class="opt" onclick="pickType(this,\'premises\')"><span class="ok">C</span>Premises liability — unsafe conditions, negligent security</button><button class="opt" onclick="pickType(this,\'wrongful\')"><span class="ok">D</span>Wrongful death of a family member</button><button class="opt" onclick="pickType(this,\'other\')"><span class="ok">E</span>Other personal injury (dog bite, product liability, assault)</button></div>'}
function optsHTML(step,qn,tot){let h='';step.opts.forEach(function(o){const cb=o.action?"function(){ans['"+step.id+"']='"+o.v+"';trigDQ('"+o.action.split(':')[1]+"')}":"function(){ans['"+step.id+"']='"+o.v+"';goNext()}";h+='<button class="opt" onclick="pickOpt(this,'+cb+')"><span class="ok">'+o.k+'</span>'+o.t+'</button>'});return '<div class="tbadge">'+B[branch].name+'</div><div class="lbl">Question '+qn+' of '+tot+'</div><div class="q">'+step.q+'</div><div class="hint">'+step.hint+'</div><div class="opts">'+h+'</div>'+nav('goBack()')}
function dateHTML(step,qn,tot){return '<div class="tbadge">'+B[branch].name+'</div><div class="lbl">Question '+qn+' of '+tot+'</div><div class="q">'+step.q+'</div><div class="hint">'+step.hint+'</div><input type="date" class="date-inp" id="di" onchange="chkDate(this)" /><div class="dnote" id="dn"></div><button class="btn-p" id="dnext" onclick="subDate()" disabled>Continue</button>'+nav('goBack()')}
function chkDate(inp){const dn=document.getElementById('dn'),nb=document.getElementById('dnext');if(!inp.value||new Date(inp.value)>new Date()){dn.textContent=inp.value?'Date cannot be in the future.':'';nb.disabled=true;return}const yrs=(new Date()-new Date(inp.value))/(1000*60*60*24*365.25);const mo=Math.round(yrs*12);dn.textContent=yrs>2?'Warning: More than 2 years ago — the statute of limitations may apply.':'Approximately '+mo+' month'+(mo===1?'':'s')+' ago — within the 2-year window.';nb.disabled=false}
function subDate(){const v=document.getElementById('di').value;const yrs=(new Date()-new Date(v))/(1000*60*60*24*365.25);if(yrs>2){trigDQ('sol_expired');return}ans.date=v;goNext()}
function contactHTML(){return '<div class="tbadge">'+B[branch].name+'</div><div class="lbl">Almost there</div><div class="q">How should we reach you?</div><div class="hint">An attorney will contact you within 1 business day — no fees unless we win</div><div class="inp-row"><div class="iw"><div class="ilbl">Full Name</div><input class="ifield" id="fn" type="text" placeholder="Your full name"/></div><div class="iw"><div class="ilbl">Phone Number</div><input class="ifield" id="fp" type="tel" placeholder="(954) 000-0000"/></div><div class="iw"><div class="ilbl">Email Address</div><input class="ifield" id="fe" type="email" placeholder="you@email.com"/></div></div><button class="btn-p" onclick="subContact()" style="margin-top:20px">Submit My Information</button>'+nav('goBack()')}
function subContact(){const n=document.getElementById('fn').value.trim();const p=document.getElementById('fp').value.trim();const e=document.getElementById('fe').value.trim();if(!n||!p||!e){alert('Please fill in all fields.');return}ans.name=n;ans.phone=p;ans.email=e;buildQL()}
function dqHTML(){const m=DQ[dqReason]||{h:'We are unable to assist with this matter.',b:'Based on your answers, your case does not meet our current intake criteria.'};return '<div class="end-ico" style="color:#484868">&#9675;</div><div class="lbl">Not a match</div><div class="eh">'+m.h+'</div><div class="eb">'+m.b+'</div><div class="nav"><button class="rs" onclick="restart()">start over</button></div>'}
function qlHTML(){const body=qlFlags.length?'A personal injury attorney will contact you within 1 business day. Note: '+qlFlags.join(' ')+' No fees or costs unless we win.':'Your case looks strong. A personal injury attorney from Louis Law Group will contact you within 1 business day. No fees or costs unless we win — ever.';return '<div class="end-ico" style="color:#c9764c">&#10003;</div><div class="lbl">You qualify</div><div class="eh">Based on your answers, you may have a valid personal injury claim.</div><div class="eb">'+body+'</div><button class="cta" onclick="window.open(\'https://api.leadconnectorhq.com/widget/bookings/openai-a081dbd5-3831-4792-bf29-630ea8b14d86-2b8edb87-2ca2-470e-87f5-d9a743e47263\',\'_blank\')">Book a Call Now</button><div class="nav" style="margin-top:18px"><button class="rs" onclick="restart()">start over</button></div>'}
function pickType(btn,type){btn.closest('.opts').querySelectorAll('.opt').forEach(function(b){b.classList.remove('sel')});btn.classList.add('sel');setTimeout(function(){Object.keys(ans).forEach(function(k){delete ans[k]});branch=type;ans.type=type;si=0;render()},240)}
function pickOpt(btn,cb){btn.closest('.opts').querySelectorAll('.opt').forEach(function(b){b.classList.remove('sel')});btn.classList.add('sel');setTimeout(cb,240)}
function goNext(){const steps=B[branch].steps;if(si<steps.length-1){si++;render()}else{si='contact';render()}}
function goBack(){if(si===0){si=-1;branch=null;render()}else if(si==='contact'){si=B[branch].steps.length-1;render()}else if(typeof si==='number'){si--;render()}}
function trigDQ(r){dqReason=r;si='dq';render()}
function buildQL(){qlFlags=[];const t=ans.treatment;if(t==='not_yet')qlFlags.push('You have not yet seen a doctor — please seek medical attention right away, as this creates critical documentation for your case.');if(t==='no')qlFlags.push('No medical treatment has been sought. Seeing a doctor immediately will both protect your health and preserve your claim.');if(ans.fault_doc==='disputed')qlFlags.push('Fault was disputed at the scene — our attorneys will review the police report and evidence to establish liability.');if(ans.fault_doc==='hitrun')qlFlags.push('This was a hit and run. Your own uninsured motorist coverage may provide a recovery path.');if(ans.auto_ins==='no')qlFlags.push('The at-fault driver may be uninsured — your UM/UIM coverage may still provide a recovery.');if(ans.auto_ins==='unknown')qlFlags.push('Insurance coverage is unconfirmed — we will investigate available coverage during our review.');if(ans.reported==='no')qlFlags.push('The incident was not reported at the time — our team can help document and preserve evidence of what occurred.');if(ans.fault==='unsure')qlFlags.push('Fault is unclear — our attorneys will investigate the circumstances to establish liability.');if(ans.defendant_ins==='no')qlFlags.push('The responsible party may be uninsured or have limited assets — recovery options will be evaluated during our review.');if(ans.estate==='unsure'||ans.estate==='willing')qlFlags.push('An estate will need to be opened to pursue this wrongful death claim — our team can guide you through the process.');if(ans.rep==='fired')qlFlags.push('You previously discharged an attorney — there may be a prior lien on any recovery, which our team will advise you on.');si='ql';render()}
function restart(){Object.keys(ans).forEach(function(k){delete ans[k]});branch=null;si=-1;dqReason=null;qlFlags=[];render()}
render();
